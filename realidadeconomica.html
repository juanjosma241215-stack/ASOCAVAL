<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASOCAVAL - Realidad Economica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="economic-body">

    <nav class="navbar">
        <div class="logo">ASOCAVAL</div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Inicio</a></li>
            <li><a href="introduccion.html"><i class="fas fa-info-circle"></i> Introduccion</a></li>
            <li><a href="realidadempresarial.html"><i class="fas fa-building"></i> Realidad Empresarial</a></li>
            <li><a href="realidadeconomica.html"><i class="fas fa-chart-line"></i> Realidad Economica</a></li>
        </ul>
    </nav>

    <main class="container economic-page">
        <section class="economic-block">
            <div class="economic-heading">
                <h3>PAISES</h3>
            </div>

            <div class="country-grid">
                <article class="country-card">
                    <div class="country-card-header">
                        <h4>Malasia</h4>
                    </div>
                    <div class="country-image-grid">
                        <figure class="country-figure country-figure-flag">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Flag_of_Malaysia.svg/1280px-Flag_of_Malaysia.svg.png" alt="Imagen de Malasia" class="country-image">
                           
                        </figure>
                    </div>
                </article>

                <article class="country-card">
                    <div class="country-card-header">
                        <h4>Indonesia</h4>
                    </div>
                    <div class="country-image-grid">
                        <figure class="country-figure country-figure-flag country-figure-indonesia">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9f/Flag_of_Indonesia.svg" alt="Bandera de Indonesia" class="country-image country-image-flag">
                            
                        </figure>
                    </div>
                </article>
            </div>
        </section>

        <section class="economic-block">
            <div class="economic-heading">
                <h3>Galeria ordenada de imagenes de Excel</h3>
            </div>

            <div class="excel-uploader" data-excel-uploader>
                <label for="excel-images" class="upload-dropzone">
                    <i class="fas fa-file-excel"></i>
                    <span>Haz clic aqui para subir imagenes de Excel</span>
                    <small>Puedes seleccionar varias a la vez</small>
                </label>
                <input id="excel-images" class="excel-input" type="file" accept="image/*" multiple data-excel-input>
                <div class="excel-actions">
                    <button type="button" class="btn-main excel-export" data-export-excel>Exportar a Excel</button>
                    <button type="button" class="rating-delete excel-clear" data-clear-excel>Eliminar imagenes</button>
                </div>
                <div class="excel-gallery" data-excel-gallery>
                    <div class="gallery-placeholder">Tus imagenes apareceran aqui ordenadas automaticamente.</div>
                </div>
            </div>
        </section>

        <section class="economic-block">
            <div class="economic-heading">

                <h3>Analisis y interpretación</h3>
            </div>

            <div class="rating-panel" data-rating-panel>
                <label class="analysis-label" for="word-analysis">Escribe tu analisis</label>
                <textarea id="word-analysis" class="analysis-input" rows="5" placeholder="Ejemplo: El cacao" data-analysis-text></textarea>

                <div class="rating-stars" data-rating-stars aria-label="Calificacion por estrellas" role="radiogroup">
                    <button type="button" class="star-btn" data-value="1" aria-label="1 estrella"><i class="fas fa-star"></i></button>
                    <button type="button" class="star-btn" data-value="2" aria-label="2 estrellas"><i class="fas fa-star"></i></button>
                    <button type="button" class="star-btn" data-value="3" aria-label="3 estrellas"><i class="fas fa-star"></i></button>
                    <button type="button" class="star-btn" data-value="4" aria-label="4 estrellas"><i class="fas fa-star"></i></button>
                    <button type="button" class="star-btn" data-value="5" aria-label="5 estrellas"><i class="fas fa-star"></i></button>
                </div>

                <div class="rating-actions">
                    <button type="button" class="btn-main rating-save" data-save-rating>Guardar calificacion</button>
                    <button type="button" class="rating-delete" data-reset-rating>Eliminar</button>
                </div>

           </div>
        </section>
    </main>

</body>
</html>
